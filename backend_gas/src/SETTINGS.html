<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --card: #ffffff;
        --line: #d9dfeb;
        --text: #162033;
        --muted: #61708a;
        --accent: #1f6feb;
        --danger: #c62828;
        --ok: #18794e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.4 Arial, sans-serif;
      }
      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 24px;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 24px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
        gap: 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 6px 20px rgba(18, 32, 51, 0.05);
      }
      .card h2 {
        margin: 0 0 14px;
        font-size: 16px;
      }
      label {
        display: block;
        margin: 12px 0 6px;
        font-weight: 700;
      }
      input[type="text"], textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px;
        font: inherit;
        color: var(--text);
        background: #fff;
      }
      textarea {
        min-height: 128px;
        resize: vertical;
      }
      .feedback {
        min-height: 220px;
        font-family: "Courier New", monospace;
        font-size: 12px;
        white-space: pre-wrap;
      }
      .check {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 12px 0;
        font-weight: 600;
      }
      .check input {
        transform: scale(1.15);
      }
      .hint {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin: 20px 0;
      }
      button {
        border: 0;
        border-radius: 12px;
        padding: 12px 16px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      .primary {
        background: var(--accent);
        color: #fff;
      }
      .secondary {
        background: #e8eefc;
        color: var(--text);
      }
      .status {
        min-height: 22px;
        font-weight: 700;
      }
      .status.ok { color: var(--ok); }
      .status.error { color: var(--danger); }
      .loading {
        opacity: 0.7;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="wrap" id="app">
      <h1>Impostazioni backend PhBOX</h1>

      <div class="grid">
        <section class="card">
          <h2>CONFIGURAZIONE</h2>
          <label for="folderId">ID cartella root</label>
          <input id="folderId" type="text" autocomplete="off">

          <label for="projectId">ID progetto</label>
          <input id="projectId" type="text" autocomplete="off">
        </section>

        <section class="card">
          <h2>EMAIL SCAN</h2>
          <label for="excludedSenders">Mittenti email da escludere</label>
          <textarea id="excludedSenders" placeholder="uno per riga"></textarea>
          <div class="hint">Supporta email intere o frammenti dominio/nome mittente.</div>

          <label class="check"><input id="scanUnreadOnly" type="checkbox"> Scansione solo email non lette</label>
          <label class="check"><input id="scanSpam" type="checkbox"> Scansione spam</label>
          <label class="check"><input id="trashValidEmails" type="checkbox"> Spostare nel cestino le email con allegati validi</label>
        </section>
      </div>

      <section class="card" style="margin-top:16px;">
        <h2>RICETTE</h2>
        <label for="acceptedCities">Città accettate</label>
        <textarea id="acceptedCities" placeholder="una per riga"></textarea>
        <div class="hint">Se vuoto, vengono accettate tutte le città.</div>

        <label class="check"><input id="acceptRecipesWithoutCity" type="checkbox"> Accettare sempre ricette senza città</label>
      </section>

      <section class="card" style="margin-top:16px;">
        <h2>FEEDBACK</h2>
        <textarea id="feedback" class="feedback" readonly></textarea>
        <div class="hint">Qui compaiono query Gmail, stato attuale e diagnostica utile.</div>
      </section>

      <div class="actions">
        <button class="primary" id="saveBtn" onclick="saveSettings()">Salva impostazioni</button>
        <button class="secondary" id="refreshBtn" onclick="refreshFeedback()">Aggiorna feedback</button>
      </div>
      <div id="status" class="status"></div>
    </div>

    <script>
      function setBusy(isBusy) {
        document.getElementById('app').classList.toggle('loading', !!isBusy);
      }

      function setStatus(message, kind) {
        const el = document.getElementById('status');
        el.textContent = message || '';
        el.className = 'status' + (kind ? ' ' + kind : '');
      }

      function collectPayload() {
        return {
          folderId: document.getElementById('folderId').value,
          firestoreProjectId: document.getElementById('projectId').value,
          excludedEmailSendersText: document.getElementById('excludedSenders').value,
          scanUnreadOnly: document.getElementById('scanUnreadOnly').checked,
          scanSpam: document.getElementById('scanSpam').checked,
          trashValidEmails: document.getElementById('trashValidEmails').checked,
          acceptedCitiesText: document.getElementById('acceptedCities').value,
          acceptRecipesWithoutCity: document.getElementById('acceptRecipesWithoutCity').checked
        };
      }

      function applyData(data) {
        const settings = (data && data.settings) || {};
        document.getElementById('folderId').value = settings.folderId || '';
        document.getElementById('projectId').value = settings.firestoreProjectId || '';
        document.getElementById('excludedSenders').value = settings.excludedEmailSendersText || '';
        document.getElementById('scanUnreadOnly').checked = !!settings.scanUnreadOnly;
        document.getElementById('scanSpam').checked = !!settings.scanSpam;
        document.getElementById('trashValidEmails').checked = !!settings.trashValidEmails;
        document.getElementById('acceptedCities').value = settings.acceptedCitiesText || '';
        document.getElementById('acceptRecipesWithoutCity').checked = !!settings.acceptRecipesWithoutCity;
        document.getElementById('feedback').value = (data && data.feedback) || '';
      }

      function loadSettings() {
        setBusy(true);
        setStatus('Caricamento...', '');
        google.script.run
          .withSuccessHandler(function(data) {
            applyData(data);
            setBusy(false);
            setStatus('Configurazione caricata.', 'ok');
          })
          .withFailureHandler(function(error) {
            setBusy(false);
            setStatus(error && error.message ? error.message : String(error), 'error');
          })
          .getPhboxSettingsPageData();
      }

      function saveSettings() {
        setBusy(true);
        setStatus('Salvataggio...', '');
        google.script.run
          .withSuccessHandler(function(data) {
            applyData(data);
            setBusy(false);
            setStatus('Impostazioni salvate.', 'ok');
          })
          .withFailureHandler(function(error) {
            setBusy(false);
            setStatus(error && error.message ? error.message : String(error), 'error');
          })
          .savePhboxSettings(collectPayload());
      }

      function refreshFeedback() {
        setBusy(true);
        setStatus('Diagnostica in corso...', '');
        google.script.run
          .withSuccessHandler(function(data) {
            document.getElementById('feedback').value = (data && data.feedback) || '';
            setBusy(false);
            setStatus('Feedback aggiornato.', 'ok');
          })
          .withFailureHandler(function(error) {
            setBusy(false);
            setStatus(error && error.message ? error.message : String(error), 'error');
          })
          .refreshPhboxSettingsFeedback();
      }

      loadSettings();
    </script>
  </body>
</html>
