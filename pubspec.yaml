name: family_boxes_2
description: Family Boxes 2
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # gestione file locali
  path_provider: ^2.1.2

  # export file (Drive / condivisione)
  share_plus: ^9.0.0

  # import file json
  file_picker: ^8.0.0

  # backup settings
  shared_preferences: ^2.2.2

  # permessi filesystem Android
  permission_handler: ^11.3.1
  font_awesome_flutter: ^10.9.1
  crypto: ^3.0.6
  http: ^1.2.1
  in_app_purchase: ^3.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2

  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false

  image_path: "assets/icon/icon.png"

  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/icon.png"

  min_sdk_android: 21